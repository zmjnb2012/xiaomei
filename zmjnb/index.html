<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小美-女装搭配师</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #coze-chat-container { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="coze-chat-container"></div>

  <!-- Coze Chat SDK 官方稳定版 -->
  <script src="https://assets.coze.cn/coze-web-sdk/chat/latest/index.js"></script>

  <script>
    function getVisitorUserId() {
      var key = 'coze_visitor_uid';
      var uid = localStorage.getItem(key);
      if (!uid) {
        uid = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem(key, uid);
      }
      return uid;
    }

    var BOT_ID    = '7652424717588299819';
    var PAT_TOKEN = 'pat_8C3fZlDhskS461lyHhq97yvbPvtjh32yErHBCbxRYoGFh9xwukZ1d8W4pEPvtu3J';  // ★ 只改这一行

    new CozeWebSDK.WebChatClient({
      config: { bot_id: BOT_ID },
      auth: { type: 'token', token: PAT_TOKEN },
      componentProps: {
        layout: 'vertical',
        title: '小美-女装搭配师',
        forceLogin: false
      },
      user: {
        user_id: getVisitorUserId(),
        user_name: '访客'
      },
      ui: {
        container: document.getElementById('coze-chat-container')
      }
    });
  </script>
</body>
</html>
